name: 24-7 Betting Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Force Install Requests
        run: python -m pip install requests
        
      - name: Run the Bot
        env:
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
        run: python main.py
