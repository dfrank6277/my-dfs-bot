name: Odds Bot Run

on:
  schedule:
    - cron: '*/13 * * * *' # Runs every 13 mins (efficient for 100k plan)
  workflow_dispatch:      # Allows you to click "Run workflow" manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Run Betting Bot
        # THIS IS THE CRITICAL PART
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: python main.py
        import os
import json

def send_discord_alert(message):
    webhook_url = os.getenv("DISCORD_WEBHOOK") # Securely get from GitHub Secrets
    data = {"content": message, "username": "DFS Optimizer"}
    requests.post(webhook_url, data=json.dumps(data), headers={"Content-Type": "application/json"})

